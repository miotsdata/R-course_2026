bookdown::gitbook:
  css: style.css
  toc_depth: 4
  config:
    toc:
      before: |
        <li><a href="./">R course 2026</a></li>
      after: |
        <li><a href="https://github.com/miotsdata/R-course_2026">GitHub</a></li>
    download: ["pdf", "rmd"]
    sharing:
      github: yes
  includes:
    in_header: google_manager.html
  resources:
    - assets/
    - scripts/

bookdown::pdf_book:
  latex_engine: xelatex
  keep_tex: false

bookdown::markdown_document2:
  base_format: rmarkdown::md_document