name: Notify students on update
on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send email to subscribers
        run: |
          curl -X POST https://api.buttondown.email/v1/emails \
          -H "Authorization: Token ${{ secrets.BUTTONDOWN_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d '{
            "subject": "R Course 2026 — new update published",
            "body": "A new version of the course has been published.\n\nYou can find it here: https://miotsdata.github.io/R-course_2026/\n\nMatteo"
          }'
